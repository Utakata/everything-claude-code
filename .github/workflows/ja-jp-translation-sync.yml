name: ja-JP Translation Sync

# ---------------------------------------------------------------------------
# Architecture:
#   Gemini API  → translate missing files (free tier, gemini-2.0-flash)
#   GitHub Actions → commit files, push branch, open PR
#   Jules API   → post inline review comments on the translation PR
#
# Required secrets:
#   GEMINI_API_KEY   – Google AI Studio (free tier sufficient)
#   JULES_API_KEY    – jules.google.com Settings  (optional; review skipped if absent)
#   JULES_SOURCE_ID  – jules.google.com/sources   (required when JULES_API_KEY is set)
# ---------------------------------------------------------------------------

on:
  schedule:
    - cron: '0 2 * * *'   # Daily 02:00 UTC (11:00 JST)
  workflow_dispatch:
    inputs:
      max_files:
        description: 'Max files to translate per run (default: 20)'
        required: false
        default: '20'
      dry_run:
        description: 'Dry run — detect only, skip translation'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ja-jp-translation-sync
  cancel-in-progress: true

jobs:
  # ── 1. Sync upstream + detect missing ──────────────────────────────────────
  sync-and-detect:
    name: Sync upstream & detect missing
    runs-on: ubuntu-latest
    outputs:
      has_missing:   ${{ steps.detect.outputs.has_missing }}
      missing_count: ${{ steps.detect.outputs.missing_count }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/affaan-m/everything-claude-code.git || true
          git fetch upstream main --quiet
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-edit --strategy-option=ours \
            -m "chore: sync upstream/main [skip ci]" || true
          git push origin main

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'

      - name: Detect missing translations
        id: detect
        run: |
          node scripts/translate-diff.js --dry-run --max 9999 \
            --output-list /tmp/missing.txt
          COUNT=$(grep -c . /tmp/missing.txt 2>/dev/null || echo 0)
          echo "missing_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "has_missing=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Missing: $COUNT file(s)"

  # ── 2. Translate with Gemini + commit + open PR ───────────────────────────
  translate-and-pr:
    name: Translate (Gemini) & open PR
    needs: sync-and-detect
    if: needs.sync-and-detect.outputs.has_missing == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.open-pr.outputs.pr_number }}
      branch:    ${{ steps.branch.outputs.name }}
      translated: ${{ steps.changes.outputs.count }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'

      - name: Set branch name
        id: branch
        run: |
          echo "name=auto/ja-jp-$(date +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.name }}"

      - name: Export translation rules for PR body
        id: rules
        run: |
          # Emit RULES_MARKDOWN from translation-rules.js as a multiline output
          RULES=$(node -e "const r=require('./scripts/lib/translation-rules'); process.stdout.write(r.RULES_MARKDOWN);")
          {
            echo "markdown<<RULES_EOF"
            echo "$RULES"
            echo "RULES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Translate with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/translate-diff.js --max "${{ inputs.max_files || '20' }}"

      - name: Count translated files
        id: changes
        run: |
          COUNT=$(git status --short docs/ja-JP/ | wc -l | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Translated: $COUNT file(s)"

      - name: Commit & push
        if: steps.changes.outputs.count != '0'
        run: |
          git add docs/ja-JP/
          NFILES=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "feat(ja-JP): auto-translate ${NFILES} file(s) via Gemini [skip ci]"
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Open PR
        id: open-pr
        if: steps.changes.outputs.count != '0'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const missing    = parseInt('${{ needs.sync-and-detect.outputs.missing_count }}', 10);
            const translated = parseInt('${{ steps.changes.outputs.count }}', 10);
            const remaining  = Math.max(0, missing - translated);
            const branch     = '${{ steps.branch.outputs.name }}';

            const rulesMarkdown = `${{ steps.rules.outputs.markdown }}`;

            const body = [
              '## 自動翻訳 PR',
              '',
              `upstream の最新変更を同期し、**${translated} ファイル**を Gemini API で日本語翻訳しました。`,
              '',
              '| 項目 | 件数 |',
              '|------|------|',
              `| 翻訳済み（このPR） | ${translated} |`,
              `| 残り未翻訳 | ${remaining} |`,
              '',
              rulesMarkdown,
              '',
              '## レビューチェックリスト',
              '',
              '- [ ] 翻訳の品質を目視確認',
              '- [ ] YAMLフロントマターのフィールド名が英語のままか確認',
              '- [ ] コードブロック内のソースコードが翻訳されていないか確認',
              '- [ ] 技術用語がカタカナ表記になっているか確認',
              '- [ ] Markdown構造が崩れていないか確認',
              '',
              remaining > 0
                ? `> ℹ️ **${remaining} ファイル**が未翻訳のまま残っています。次回の自動実行で処理されます。`
                : '> ✅ すべてのファイルが翻訳されました。',
              '',
              '---',
              '*翻訳エンジン: Gemini API (gemini-2.0-flash) | レビュー: Jules API*',
              '*[ja-JP Translation Sync](../../blob/main/.github/workflows/ja-jp-translation-sync.yml) ワークフローにより自動生成*',
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `feat(ja-JP): auto-translate ${translated} file(s) via Gemini`,
              head:  branch,
              base:  'main',
              body,
            });
            console.log(`PR created: ${pr.data.html_url}`);
            core.setOutput('pr_number', String(pr.data.number));

  # ── 3. Jules review ────────────────────────────────────────────────────────
  jules-review:
    name: Jules translation review
    needs: translate-and-pr
    if: needs.translate-and-pr.outputs.pr_number != '' && needs.translate-and-pr.outputs.translated != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: scripts/

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'

      - name: Request Jules review
        env:
          JULES_API_KEY:   ${{ secrets.JULES_API_KEY }}
          JULES_SOURCE_ID: ${{ secrets.JULES_SOURCE_ID }}
          PR_NUMBER:       ${{ needs.translate-and-pr.outputs.pr_number }}
          GITHUB_HEAD_REF: ${{ needs.translate-and-pr.outputs.branch }}
        run: |
          if [ -z "$JULES_API_KEY" ]; then
            echo "ℹ️  JULES_API_KEY not configured — skipping Jules review."
            exit 0
          fi
          node scripts/jules-review-request.js \
            --pr "$PR_NUMBER" \
            --branch "$GITHUB_HEAD_REF"

  # ── 4. All up to date ──────────────────────────────────────────────────────
  up-to-date:
    name: All translations up to date
    needs: sync-and-detect
    if: needs.sync-and-detect.outputs.has_missing == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ ja-JP translations are fully up to date with upstream."
