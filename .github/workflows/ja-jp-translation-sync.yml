name: ja-JP Translation Sync

# ---------------------------------------------------------------------------
# Translation backend priority:
#   1. Jules API  (primary)  — submits a session; Jules commits to the branch
#                              directly and this workflow creates the PR.
#                              Falls back when Jules returns 429 / unavailable.
#   2. Gemini API (fallback) — translates inline (free tier: gemini-2.0-flash).
#
# Required secrets:
#   JULES_API_KEY     — from jules.google.com Settings (optional but preferred)
#   JULES_SOURCE_ID   — repository source ID from jules.google.com/sources
#   GEMINI_API_KEY    — Google AI Studio key (fallback, free tier available)
# ---------------------------------------------------------------------------

on:
  schedule:
    # Daily at 02:00 UTC (11:00 JST)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      max_files:
        description: 'Max files to translate per run (default: 20)'
        required: false
        default: '20'
      dry_run:
        description: 'Dry run — detect only, skip translation'
        required: false
        type: boolean
        default: false
      force_gemini:
        description: 'Skip Jules and use Gemini directly'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ja-jp-translation-sync
  cancel-in-progress: true

jobs:
  # ── 1. Sync upstream + detect missing ──────────────────────────────────────
  sync-upstream:
    name: Sync upstream & detect missing translations
    runs-on: ubuntu-latest
    outputs:
      has_missing:   ${{ steps.detect.outputs.has_missing }}
      missing_count: ${{ steps.detect.outputs.missing_count }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote & fetch
        run: |
          git remote add upstream https://github.com/affaan-m/everything-claude-code.git || true
          git fetch upstream main --quiet

      - name: Merge upstream (preserve existing ja-JP translations)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main \
            --no-edit \
            --strategy-option=ours \
            -m "chore: sync upstream/main [skip ci]" \
            || true

      - name: Push synced main
        run: git push origin main

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'

      - name: Detect missing translations
        id: detect
        run: |
          node scripts/translate-diff.js --dry-run --max 9999 --output-list /tmp/missing-files.txt
          COUNT=$(grep -c . /tmp/missing-files.txt 2>/dev/null || echo 0)
          echo "missing_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt "0" ]; then
            echo "has_missing=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_missing=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Missing translations: $COUNT"

  # ── 2. Translate (Jules primary → Gemini fallback) ─────────────────────────
  translate:
    name: Translate missing files
    needs: sync-upstream
    if: needs.sync-upstream.outputs.has_missing == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    outputs:
      backend:       ${{ steps.run.outputs.backend }}
      jules_handled: ${{ steps.run.outputs.jules_handled }}
      translated:    ${{ steps.changes.outputs.count }}
      branch:        ${{ steps.branch.outputs.name }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20.x'

      - name: Set branch name
        id: branch
        run: |
          BRANCH="auto/ja-jp-translation-$(date +'%Y%m%d-%H%M')"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create translation branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.name }}"
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Run translation (Jules → Gemini fallback)
        id: run
        env:
          JULES_API_KEY:   ${{ secrets.JULES_API_KEY }}
          JULES_SOURCE_ID: ${{ secrets.JULES_SOURCE_ID }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REF_NAME: ${{ steps.branch.outputs.name }}
        run: |
          MAX="${{ inputs.max_files || '20' }}"
          EXTRA_FLAGS=""
          if [ "${{ inputs.force_gemini }}" = "true" ]; then
            EXTRA_FLAGS="--force-gemini"
          fi

          # Capture which backend was used via exit code pattern:
          #   Script prints "Jules session created" → jules_handled=true
          #   Otherwise Gemini ran inline → jules_handled=false
          OUTPUT=$(node scripts/translate-diff.js --max "$MAX" $EXTRA_FLAGS 2>&1)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Jules session created"; then
            echo "backend=jules"       >> "$GITHUB_OUTPUT"
            echo "jules_handled=true"  >> "$GITHUB_OUTPUT"
          else
            echo "backend=gemini"      >> "$GITHUB_OUTPUT"
            echo "jules_handled=false" >> "$GITHUB_OUTPUT"
          fi

      # When Jules handled it, it commits directly — pull those commits.
      - name: Pull Jules commits (if Jules handled translation)
        if: steps.run.outputs.jules_handled == 'true'
        run: |
          # Jules commits asynchronously; wait up to 10 min for its commit.
          echo "Waiting for Jules to commit translated files..."
          for i in $(seq 1 20); do
            sleep 30
            git fetch origin "${{ steps.branch.outputs.name }}"
            AHEAD=$(git rev-list HEAD..origin/"${{ steps.branch.outputs.name }}" --count)
            if [ "$AHEAD" -gt "0" ]; then
              echo "Jules committed $AHEAD new commit(s). Pulling."
              git pull origin "${{ steps.branch.outputs.name }}"
              break
            fi
            echo "  attempt $i/20 — no Jules commits yet..."
          done

      - name: Count new translation files
        id: changes
        run: |
          NEW=$(git status --short docs/ja-JP/ | wc -l | tr -d ' ')
          echo "count=$NEW" >> "$GITHUB_OUTPUT"
          echo "New/modified files: $NEW"

      # Gemini wrote files locally — commit and push them.
      - name: Commit Gemini translations
        if: steps.run.outputs.jules_handled == 'false' && steps.changes.outputs.count != '0'
        run: |
          git add docs/ja-JP/
          COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "feat(ja-JP): auto-translate ${COUNT} file(s) via Gemini [skip ci]"
          git push origin "${{ steps.branch.outputs.name }}"

  # ── 3. Open PR ─────────────────────────────────────────────────────────────
  open-pr:
    name: Open Pull Request
    needs: [sync-upstream, translate]
    if: needs.translate.outputs.translated != '0' || needs.translate.outputs.jules_handled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create Pull Request
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch     = '${{ needs.translate.outputs.branch }}';
            const backend    = '${{ needs.translate.outputs.backend }}';
            const julesHandled = '${{ needs.translate.outputs.jules_handled }}' === 'true';
            const missing    = parseInt('${{ needs.sync-upstream.outputs.missing_count }}', 10);
            const max        = parseInt('${{ inputs.max_files || 20 }}', 10);
            const translated = parseInt('${{ needs.translate.outputs.translated }}', 10) || max;
            const remaining  = Math.max(0, missing - translated);

            const backendLabel = julesHandled
              ? '🤖 Jules API (Google)'
              : '💫 Gemini API (フォールバック)';

            const body = [
              '## 自動翻訳 PR',
              '',
              `upstream の最新変更を同期し、**${translated} ファイル**を日本語に翻訳しました。`,
              '',
              '| 項目 | 内容 |',
              '|------|------|',
              `| 翻訳エンジン | ${backendLabel} |`,
              `| 翻訳済み（このPR） | ${translated} 件 |`,
              `| 残り未翻訳 | ${remaining} 件 |`,
              '',
              julesHandled
                ? '> Jules がリポジトリを直接操作して翻訳・コミットしました。'
                : '> Jules がビジー（429）だったため Gemini にフォールバックしました。',
              '',
              '## 確認事項',
              '',
              '- [ ] 翻訳の品質を目視確認',
              '- [ ] YAMLフロントマターのフィールド名が英語のままか確認',
              '- [ ] コードブロック内のソースコードが翻訳されていないか確認',
              '- [ ] 技術用語がカタカナ表記になっているか確認',
              '',
              remaining > 0
                ? `> ℹ️ **${remaining} ファイル**が未翻訳のまま残っています。次回の自動実行で処理されます。`
                : '> ✅ すべてのファイルが翻訳されました。',
              '',
              '---',
              '*このPRは [ja-JP Translation Sync](../../blob/main/.github/workflows/ja-jp-translation-sync.yml) ワークフローによって自動生成されました。*',
            ].join('\n');

            // Check if a PR for this branch already exists (Jules may have created one)
            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (existing.data.length > 0) {
              console.log(`PR already exists: ${existing.data[0].html_url}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `feat(ja-JP): auto-translate ${translated} file(s) [${backend}]`,
              head:  branch,
              base:  'main',
              body,
            });
            console.log(`PR created: ${pr.data.html_url}`);

  # ── 4. All up to date ──────────────────────────────────────────────────────
  report-no-missing:
    name: All translations up to date
    needs: sync-upstream
    if: needs.sync-upstream.outputs.has_missing == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ ja-JP translations are fully up to date with upstream."
